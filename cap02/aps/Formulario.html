<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
</head>
<body>
    <a href="Menu.html">Voltar para Menu!</a>
    <br>
    <h1>Informações Pessoais</h1>
    <fieldset>
        <legend>Cadastro do Cliente</legend>
        
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Digite o nome do cliente">
        <br><br>

        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade" placeholder="Digite a idade">
        <br><br>

        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" placeholder="Digite o endereço">
        <br><br>

        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Digite a cidade">
        <br><br>

        <label for="estado">Estado:</label>
        <select name="estado" id="estado">
            <option value="" disabled selected>UF</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
        </select>
        <br><br>

        <label for="cep">CEP:</label>
        <input type="text" name="cep" id="cep" placeholder="XXXXX-XXX">
        <br><br>

        <label for="tel_res">Tel/Res:</label>
        <input type="tel" name="tel_res" id="tel_res" placeholder="99 99999-9999">
        <br><br>

        <label for="tel_cel">Tel/Cel:</label>
        <input type="tel" name="tel_cel" id="tel_cel" placeholder="99 99999-9999">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite o seu e-mail">
    </fieldset>
    <input type="button" value="Enviar">
</body>
</html>
