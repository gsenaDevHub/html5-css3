<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Meu amigo cão - Pet Sho</title>
</head>
<body>
    <section>
        <div>
            <form action="">
                <a href="../index.html">Voltar para o Menu</a><br>
                <h1>Meu amigo cão - Pet Shop</h1><br>
                <h3>Animal</h3>
                <br>
                <fieldset>
                    <legend>informações de alguma coisa:</legend>
                    <p>
                        <label for="nome">Nome</label>
                        <input type="text" placeholder="Digite o nome do animal">
                        <br><br>
                        <input type="radio" name="porte" id="pn" checked>
                        <label for="pn">Pequena</label>
                        <input type="radio" name="porte" id="me">
                        <label for="me">Media</label>
                        <input type="radio" name="porte" id="gd">
                        <label for="gd">Grnde</label>
                    </p>
                    <br>
                    <p>
                        <select name="opcao" id="opcao">
                            <option value="1">Opção 1</option>
                            <option value="2">Opção 2</option>
                            <option value="3">Opção 3</option>
                        </select>
                    </p>
                </fieldset>
                <br>
                <label for="obs">Observações:</label>
                <br>
                <textarea name="" id="" cols="30" rows="10" placeholder="informações Extras..."></textarea>
                <br>
                <div>
                    <label for="">Selecione uma opção:</label><br>
                    <input type="checkbox" name="item1" id="item1"><label for="">Item1</label>
                    <input type="checkbox" name="item2" id="item2"><label for="">Item2</label>
                    <input type="checkbox" name="item3" id="item3"><label for="">Item3</label>
                </div>
            </div>
        </form>
    </section>
</body>
</html>
